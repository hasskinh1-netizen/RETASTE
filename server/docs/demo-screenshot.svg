<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#FFB347"/>
      <stop offset="1" stop-color="#FFCC33"/>
    </linearGradient>
    <style>
      .bg{fill:url(#g)}
      .title{font-family:Arial, Helvetica, sans-serif;font-size:44px;fill:#222}
      .subtitle{font-family:Arial, Helvetica, sans-serif;font-size:20px;fill:#333}
      .card{fill:#fff;stroke:#eee;stroke-width:1;rx:8;ry:8}
      .item{font-family:Arial;font-size:18px;fill:#444}
      .btn{fill:#ff6b6b;rx:6;ry:6}
      .btn-text{font-family:Arial;font-size:16px;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="630" rx="12"/>
  <g transform="translate(60,60)">
    <text class="title">RETASTE</text>
    <text class="subtitle" y="40">Demo giao diện - Trang Menu & Gợi ý</text>

    <g transform="translate(0,80)">
      <rect class="card" width="520" height="380"/>
      <text class="item" x="24" y="36">Menu</text>
      <rect x="24" y="56" width="200" height="60" rx="8" ry="8" fill="#f8f8f8"/>
      <text class="item" x="36" y="96">Bánh mì thịt</text>
      <rect x="24" y="128" width="200" height="60" rx="8" ry="8" fill="#f8f8f8"/>
      <text class="item" x="36" y="168">Phở bò</text>
      <rect x="24" y="200" width="200" height="60" rx="8" ry="8" fill="#f8f8f8"/>
      <text class="item" x="36" y="240">Cà phê sữa đá</text>
      <rect x="24" y="300" width="120" height="40" class="btn"/>
      <text class="btn-text" x="48" y="327">Thêm vào giỏ</text>
    </g>

    <g transform="translate(640,80)">
      <rect class="card" width="440" height="200"/>
      <text class="item" x="24" y="36">Gợi ý cho bạn</text>
      <rect x="24" y="56" width="120" height="40" rx="6" ry="6" fill="#fff"/>
      <text class="item" x="156" y="84">Trà sữa matcha - 4.8 ★</text>

      <rect x="24" y="108" width="120" height="40" rx="6" ry="6" fill="#fff"/>
      <text class="item" x="156" y="136">Cơm gà xối mỡ - 4.7 ★</text>

      <rect x="24" y="160" width="120" height="40" rx="6" ry="6" fill="#fff"/>
      <text class="item" x="156" y="188">Sinh tố bơ - 4.6 ★</text>
    </g>
  </g>
</svg>